naftiko: 1.0.0-alpha2
info:
  label: Burger King's Partners API — Loyalty
  description: 'Loyalty surface of the Restaurant Brands International (RBI) Partners platform. 1 operation(s). Lead operation: Identify. Self-contained Naftiko capability covering one Restaurant Brands International business surface.'
  tags:
  - Restaurant Brands International
  - Partners API
  - Loyalty
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    RBI_PARTNERS_JWT: RBI_PARTNERS_JWT
capability:
  consumes:
  - type: http
    namespace: channel-loyalty
    baseUri: https://bk-partners.rbictg.com/api/v1
    description: Burger King's Partners API — Loyalty business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.RBI_PARTNERS_JWT}}'
    resources:
    - name: loyalty-identify
      path: /loyalty/identify
      operations:
      - name: identify
        method: POST
        description: Identify
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload for Identify.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-loyalty-rest
    port: 8080
    description: REST adapter for Burger King's Partners API — Loyalty. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/loyalty-identify
      name: loyalty-identify
      description: REST surface for Identify.
      operations:
      - method: POST
        name: identify
        description: Identify
        call: channel-loyalty.identify
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-loyalty-mcp
    port: 9090
    transport: http
    description: MCP adapter for Burger King's Partners API — Loyalty. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: identify
      description: Identify
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-loyalty.identify
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
