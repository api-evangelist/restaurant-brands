naftiko: 1.0.0-alpha2
info:
  label: Burger King's Partners API v2 — Menus
  description: 'Menus surface of the Restaurant Brands International (RBI) Partners platform. 2 operation(s). Lead operation: Individual Store Menu. Self-contained Naftiko capability covering one Restaurant Brands International business surface.'
  tags:
  - Restaurant Brands International
  - Partners API
  - Menus
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    RBI_PARTNERS_JWT: RBI_PARTNERS_JWT
capability:
  consumes:
  - type: http
    namespace: menu-v2-menus
    baseUri: https://bk-partners.rbictg.com/api/v2
    description: Burger King's Partners API v2 — Menus business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.RBI_PARTNERS_JWT}}'
    resources:
    - name: stores-store-id-menus
      path: /stores/{storeId}/menus
      operations:
      - name: getStoreMenu
        method: GET
        description: Individual Store Menu
        inputParameters:
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        - name: storeId
          in: path
          type: string
          required: false
          description: Unique Store ID
        - name: serviceMode
          in: path
          type: string
          required: false
          description: Service mode
        - name: version
          in: query
          type: string
          required: false
          description: Menu version ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stores-menus
      path: /stores/menus
      operations:
      - name: getStoreMenu
        method: GET
        description: Menu
        inputParameters:
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        - name: storeId
          in: path
          type: string
          required: false
          description: Unique Store ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: menu-v2-menus-rest
    port: 8080
    description: REST adapter for Burger King's Partners API v2 — Menus. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/stores-store-id-menus
      name: stores-store-id-menus
      description: REST surface for Individual Store Menu.
      operations:
      - method: GET
        name: getStoreMenu
        description: Individual Store Menu
        call: menu-v2-menus.getStoreMenu
        with:
          x-ui-region: rest.x-ui-region
          storeId: rest.storeId
          serviceMode: rest.serviceMode
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores-menus
      name: stores-menus
      description: REST surface for Menu.
      operations:
      - method: GET
        name: getStoreMenu
        description: Menu
        call: menu-v2-menus.getStoreMenu
        with:
          x-ui-region: rest.x-ui-region
          storeId: rest.storeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: menu-v2-menus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Burger King's Partners API v2 — Menus. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: individual-store-menu
      description: Individual Store Menu
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: menu-v2-menus.getStoreMenu
      with:
        x-ui-region: tools.x-ui-region
        storeId: tools.storeId
        serviceMode: tools.serviceMode
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
    - name: menu
      description: Menu
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: menu-v2-menus.getStoreMenu
      with:
        x-ui-region: tools.x-ui-region
        storeId: tools.storeId
      outputParameters:
      - type: object
        mapping: $.
