naftiko: 1.0.0-alpha2
info:
  label: Burger King's Partners API — Orders
  description: 'Orders surface of the Restaurant Brands International (RBI) Partners platform. 5 operation(s). Lead operation: Order. Self-contained Naftiko capability covering one Restaurant Brands International business surface.'
  tags:
  - Restaurant Brands International
  - Partners API
  - Orders
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    RBI_PARTNERS_JWT: RBI_PARTNERS_JWT
capability:
  consumes:
  - type: http
    namespace: channel-orders
    baseUri: https://bk-partners.rbictg.com/api/v1
    description: Burger King's Partners API — Orders business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.RBI_PARTNERS_JWT}}'
    resources:
    - name: orders-channel-order-id
      path: /orders/channel/{orderId}
      operations:
      - name: getOrder
        method: GET
        description: Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Unique Order ID
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-price
      path: /orders/price
      operations:
      - name: priceOrder
        method: POST
        description: Price Order
        inputParameters:
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        - name: body
          in: body
          type: object
          required: true
          description: Request payload for Price Order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-order-id-commit
      path: /orders/{orderId}/commit
      operations:
      - name: commitOrder
        method: POST
        description: Commit Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Unique Order ID
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        - name: body
          in: body
          type: object
          required: true
          description: Request payload for Commit Order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-order-id-fire
      path: /orders/{orderId}/fire
      operations:
      - name: fireOrder
        method: POST
        description: Fire Order
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Unique Order ID
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders-place
      path: /orders/place
      operations:
      - name: placeOrder
        method: POST
        description: Place Order
        inputParameters:
        - name: x-ui-region
          in: header
          type: string
          required: false
          description: "The Unicode [Common Locale Data Repository (CLDR)](http://cldr.unicode.org/)\nregion code of the country or region of the address.\n\nFor the full list of country codes, refer to the [CLDR Chart](http://www.unicode.org/cldr/charts/30/supplemental/territory_information.html).\n"
        - name: body
          in: body
          type: object
          required: true
          description: Request payload for Place Order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: channel-orders-rest
    port: 8080
    description: REST adapter for Burger King's Partners API — Orders. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/orders-channel-order-id
      name: orders-channel-order-id
      description: REST surface for Order.
      operations:
      - method: GET
        name: getOrder
        description: Order
        call: channel-orders.getOrder
        with:
          orderId: rest.orderId
          x-ui-region: rest.x-ui-region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders-price
      name: orders-price
      description: REST surface for Price Order.
      operations:
      - method: POST
        name: priceOrder
        description: Price Order
        call: channel-orders.priceOrder
        with:
          x-ui-region: rest.x-ui-region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders-order-id-commit
      name: orders-order-id-commit
      description: REST surface for Commit Order.
      operations:
      - method: POST
        name: commitOrder
        description: Commit Order
        call: channel-orders.commitOrder
        with:
          orderId: rest.orderId
          x-ui-region: rest.x-ui-region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders-order-id-fire
      name: orders-order-id-fire
      description: REST surface for Fire Order.
      operations:
      - method: POST
        name: fireOrder
        description: Fire Order
        call: channel-orders.fireOrder
        with:
          orderId: rest.orderId
          x-ui-region: rest.x-ui-region
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders-place
      name: orders-place
      description: REST surface for Place Order.
      operations:
      - method: POST
        name: placeOrder
        description: Place Order
        call: channel-orders.placeOrder
        with:
          x-ui-region: rest.x-ui-region
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: channel-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Burger King's Partners API — Orders. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: order
      description: Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: channel-orders.getOrder
      with:
        orderId: tools.orderId
        x-ui-region: tools.x-ui-region
      outputParameters:
      - type: object
        mapping: $.
    - name: price-order
      description: Price Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-orders.priceOrder
      with:
        x-ui-region: tools.x-ui-region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: commit-order
      description: Commit Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-orders.commitOrder
      with:
        orderId: tools.orderId
        x-ui-region: tools.x-ui-region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fire-order
      description: Fire Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-orders.fireOrder
      with:
        orderId: tools.orderId
        x-ui-region: tools.x-ui-region
      outputParameters:
      - type: object
        mapping: $.
    - name: place-order
      description: Place Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channel-orders.placeOrder
      with:
        x-ui-region: tools.x-ui-region
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
