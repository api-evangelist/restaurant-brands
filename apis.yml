description: >-
  Restaurant Brands International (RBI, NYSE: QSR) is one of the world's largest quick service restaurant companies,
  with nearly $45 billion in annual system-wide sales and over 32,000 restaurants in more than 120 countries and
  territories. RBI operates four iconic brands — Tim Hortons, Burger King, Popeyes Louisiana Kitchen, and Firehouse Subs
  — and in May 2024 closed its $1B acquisition of Carrols Restaurant Group, Burger King's largest U.S. franchisee. RBI
  Tech Group (rbictg.com) publishes a partner developer portal (the RBI Developer Portal on Confluence) documenting the
  Partners API — a set of partner-onboarding REST APIs for third-party food ordering marketplaces and POS/kiosk vendors
  integrating into RBI's fulfillment platform. The documented surface includes ordering (price / commit / fire / place),
  menu and store retrieval, store-status and order/menu webhooks (Burger King's Partners API v1 "Channel" and v2
  "Menu"), loyalty identification and transaction validation, and payment capture / refund endpoints. Access is
  bilateral: partners request a Staging environment and are issued environment-, country-, and brand-scoped credentials
  (a bearer JWT for the Partners API; x-region / x-api-key / x-user-datetime headers for the Loyalty middleware). There
  is no public self-service signup, pricing, or rate card. The public GitHub presence (github.com/rbilabs) is limited to
  internal tooling forks and an archived hackathon repo.
apis:
  - name: Channel Partners API
    description: >-
      Burger King's Partners API v1 — the Channel Partners API for third-party food ordering marketplaces integrating
      into the Restaurant Brands International (RBI) fulfillment platform. Covers loyalty identification, store and menu
      retrieval, the order lifecycle (price, commit, fire, place), and order/menu/store webhooks. OpenAPI 3.1.0, bearer
      JWT auth.
    baseURL: https://bk-partners.rbictg.com/api/v1
    humanURL: https://bk-partners.rbictg.com/docs/channel/
    tags:
      - Ordering
      - Loyalty
      - Menus
      - Stores
      - Partner Integration
    properties:
