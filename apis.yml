  - name: Partners Menu API v2
    description: >-
      Burger King's Partners API v2 — the Partners Menu API for third-party food ordering marketplaces retrieving store
      menus from Burger King's end-to-end fulfillment platform. OpenAPI 3.1.0, bearer JWT auth.
    baseURL: https://bk-partners.rbictg.com/api/v2
