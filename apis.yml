description: >-
  Restaurant Brands International (RBI, NYSE: QSR) is one of the world's
  largest quick service restaurant companies, with nearly $45 billion in
  annual system-wide sales and over 32,000 restaurants in more than 120
  countries and territories. RBI operates four iconic brands — Tim Hortons,
  Burger King, Popeyes Louisiana Kitchen, and Firehouse Subs — and in May
  2024 closed its $1B acquisition of Carrols Restaurant Group, Burger King's
  largest U.S. franchisee. RBI publishes no public developer program; its
  consumer ordering, loyalty (Royal Perks, Tims Rewards, Popeyes Rewards,
  Firehouse Rewards), and franchisee/POS surfaces run on a private GraphQL
  backend operated by RBI Tech Group (rbictg.com) and integrate with
  NCR Voyix BSP POS APIs via HMAC. The public-facing GitHub presence
  (github.com/rbilabs) is limited to internal tooling forks (GraphQL schema
  utilities, Apollo Server DynamoDB cache, AWS API Gateway Developer Portal,
  Cypress autorecord, Jira PR link action) and an archived hackathon repo.
